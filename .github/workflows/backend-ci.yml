name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

env:
  AWS_REGION: us-east-1
  EKS_CLUSTER_NAME: week5-ci-cd-prod-eks
  K8S_NAMESPACE: apps
  K8S_DEPLOYMENT_NAME: backend
  K8S_CONTAINER_NAME: backend
  ECR_REPOSITORY: week5-backend

jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: flake8 app.py tests

      - name: Test
        run: pytest

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || vars.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN || vars.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend Docker image
        run: docker build -t ${ECR_REPOSITORY}:${GITHUB_SHA} .

      - name: Tag backend image for ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker tag ${ECR_REPOSITORY}:${GITHUB_SHA} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}

      - name: Push backend image to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA}

      - name: Setup kubectl
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig for EKS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: aws eks update-kubeconfig --region ${AWS_REGION} --name ${EKS_CLUSTER_NAME}

      - name: Deploy backend to EKS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          kubectl set image deployment/${K8S_DEPLOYMENT_NAME} \
            ${K8S_CONTAINER_NAME}=${ECR_REGISTRY}/${ECR_REPOSITORY}:${GITHUB_SHA} \
            --namespace ${K8S_NAMESPACE}
          kubectl rollout status deployment/${K8S_DEPLOYMENT_NAME} --namespace ${K8S_NAMESPACE}
