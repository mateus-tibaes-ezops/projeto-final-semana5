name: Infra CI

on:
  push:
    branches: [main]
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-ci.yml"
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra-ci.yml"

jobs:
  terraform-validate-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID || vars.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY || vars.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN || vars.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        env:
          TF_VAR_aws_region: "us-east-1"
          TF_VAR_project_name: "week5-ci-cd"
          TF_VAR_environment: "prod"
          TF_VAR_backend_image: "618889059366.dkr.ecr.us-east-1.amazonaws.com/week5-backend:latest"
          TF_VAR_frontend_image: "618889059366.dkr.ecr.us-east-1.amazonaws.com/week5-frontend:latest"
          TF_VAR_route53_zone_name: "ezopscloud.co"
          TF_VAR_route53_subdomain: "mateus-tibaes.ezopscloud.co"
        run: terraform plan -lock=false -input=false
