apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: gp3
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: ebs.csi.aws.com
parameters:
  type: gp3
  fsType: ext4
reclaimPolicy: Delete
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/name: observability
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus-lowcost
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/metrics
      - nodes/proxy
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
  - nonResourceURLs:
      - /metrics
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-lowcost
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus-lowcost
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: observability
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 60s
      scrape_timeout: 10s
      evaluation_interval: 60s
      external_labels:
        cluster: week5-ci-cd-prod-eks
        environment: prod

    rule_files:
      - /etc/prometheus/alert.rules.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.observability.svc.cluster.local:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: kubernetes-apiservers
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https
        metric_relabel_configs:
          - source_labels: [__name__]
            action: keep
            regex: "up|apiserver_request_total|apiserver_request_duration_seconds_(bucket|sum|count)|process_resident_memory_bytes|process_cpu_seconds_total"

      - job_name: kubernetes-pods-cadvisor-essential
        kubernetes_sd_configs:
          - role: node
        scheme: https
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        relabel_configs:
          - source_labels: [__meta_kubernetes_node_name]
            target_label: instance
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
        metric_relabel_configs:
          - source_labels: [namespace]
            action: keep
            regex: "apps|observability"
          - source_labels: [container]
            action: drop
            regex: "^$|POD"
          - source_labels: [__name__]
            action: keep
            regex: "container_cpu_usage_seconds_total|container_memory_working_set_bytes|container_network_receive_bytes_total|container_network_transmit_bytes_total|container_fs_usage_bytes"

      - job_name: annotated-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: "apps|observability"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: "(.+)"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            target_label: __address__
            regex: "([^:]+)(?::\\d+)?;(\\d+)"
            replacement: "$1:$2"
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
  alert.rules.yml: |
    groups:
      - name: lowcost-observability
        rules:
          - alert: PrometheusTargetDown
            expr: up == 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Prometheus target down"
              description: "Target {{ $labels.job }} / {{ $labels.instance }} has been down for more than 5 minutes."

          - alert: PodHighCpuUsage
            expr: sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace=~"apps|observability"}[5m])) > 0.8
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High pod CPU usage"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is using more than 0.8 CPU cores for 10 minutes."

          - alert: PodHighMemoryUsage
            expr: sum by (namespace, pod) (container_memory_working_set_bytes{namespace=~"apps|observability"}) > 700 * 1024 * 1024
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "High pod memory usage"
              description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is using more than 700MiB of memory for 10 minutes."

          - alert: ApiServerHighErrorRate
            expr: sum(rate(apiserver_request_total{code=~"5.."}[5m])) > 0.1
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Kubernetes API server 5xx errors"
              description: "The Kubernetes API server is returning more than 0.1 5xx responses per second for 10 minutes."

          - alert: BackendDown
            expr: absent_over_time(container_cpu_usage_seconds_total{namespace="apps", pod=~"backend-.*", container!="", container!="POD"}[2m])
            for: 1m
            labels:
              severity: critical
              namespace: apps
              app: backend
            annotations:
              summary: "Backend application is down"
              description: "No backend pod metrics have been received for more than 2 minutes."

          - alert: FrontendDown
            expr: absent_over_time(container_cpu_usage_seconds_total{namespace="apps", pod=~"frontend-.*", container!="", container!="POD"}[2m])
            for: 1m
            labels:
              severity: critical
              namespace: apps
              app: frontend
            annotations:
              summary: "Frontend application is down"
              description: "No frontend pod metrics have been received for more than 2 minutes."
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-data
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp3
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: prometheus
    spec:
      serviceAccountName: prometheus
      securityContext:
        fsGroup: 65534
      containers:
        - name: prometheus
          image: prom/prometheus:v3.5.3
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=24h
            - --storage.tsdb.retention.size=1GB
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: prometheus-data
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observability
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: slack-notifications
      group_by:
        - alertname
        - namespace
        - pod
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: slack-notifications
        slack_configs:
          # The webhook stored in this Secret must be created in the company Slack workspace
          # and installed for #treinamento-devops-pub / C03QMEYS7DY. Slack may ignore channel overrides
          # when the incoming webhook is bound to another destination.
          - api_url_file: /etc/alertmanager-secrets/slack-webhook-url
            channel: "C03QMEYS7DY"
            send_resolved: true
            title: "[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}"
            text: >-
              {{ range .Alerts -}}
              *Severity:* {{ .Labels.severity }}
              *Namespace:* {{ .Labels.namespace }}
              *Pod:* {{ .Labels.pod }}
              *Summary:* {{ .Annotations.summary }}
              *Description:* {{ .Annotations.description }}
              {{ end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observability
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.29.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
              readOnly: true
            - name: slack-webhook
              mountPath: /etc/alertmanager-secrets
              readOnly: true
            - name: data
              mountPath: /alertmanager
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: slack-webhook
          secret:
            secretName: alertmanager-company-slack
            items:
              - key: webhook-url
                path: slack-webhook-url
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
  namespace: observability
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.observability.svc.cluster.local:9090
        isDefault: true
        editable: false
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: lowcost
        orgId: 1
        folder: Observability
        type: file
        disableDeletion: true
        editable: false
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-lowcost
  namespace: observability
data:
  lowcost.json: |
    {
      "uid": "lowcost-observability",
      "title": "Low Cost Observability",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "1m",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "type": "stat",
          "title": "Targets Up",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "targets": [{ "expr": "sum(up)", "refId": "A" }]
        },
        {
          "type": "timeseries",
          "title": "Pod CPU cores",
          "gridPos": { "x": 6, "y": 0, "w": 18, "h": 8 },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{namespace=~\"apps|observability\"}[5m]))",
              "refId": "A"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Pod memory working set",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (container_memory_working_set_bytes{namespace=~\"apps|observability\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" }, "overrides": [] }
        },
        {
          "type": "timeseries",
          "title": "Pod network receive",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum by (namespace, pod) (rate(container_network_receive_bytes_total{namespace=~\"apps|observability\"}[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "Bps" }, "overrides": [] }
        },
        {
          "type": "stat",
          "title": "Active alerts",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 4 },
          "targets": [
            {
              "expr": "sum(ALERTS{alertstate=\"firing\"})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          }
        },
        {
          "type": "table",
          "title": "Alert status",
          "gridPos": { "x": 6, "y": 16, "w": 18, "h": 8 },
          "targets": [
            {
              "expr": "ALERTS{alertstate=~\"pending|firing\"}",
              "format": "table",
              "instant": true,
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "cellOptions": {
                  "type": "auto"
                },
                "inspect": false
              }
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "footer": {
              "show": false,
              "reducer": ["sum"],
              "countRows": false,
              "fields": ""
            }
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "Value": true,
                  "cluster": true,
                  "container": true,
                  "endpoint": true,
                  "instance": true,
                  "job": true,
                  "pod_template_hash": true,
                  "prometheus": true,
                  "service": true
                },
                "indexByName": {
                  "alertname": 0,
                  "severity": 1,
                  "alertstate": 2,
                  "namespace": 3,
                  "pod": 4
                },
                "renameByName": {
                  "alertname": "Alert",
                  "severity": "Severity",
                  "alertstate": "State",
                  "namespace": "Namespace",
                  "pod": "Pod"
                }
              }
            }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana-oss:13.0.1
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://mateus-tibaes.ezopscloud.co/grafana/"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "true"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_PLUGINS_PREINSTALL_DISABLED
              value: "true"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources/datasource.yml
              subPath: datasource.yml
              readOnly: true
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yml
              subPath: dashboards.yml
              readOnly: true
            - name: dashboard
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
        - name: dashboard
          configMap:
            name: grafana-dashboard-lowcost
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-proxy-nginx
  namespace: apps
data:
  default.conf: |
    server {
      listen 8080;

      location = /healthz {
        access_log off;
        return 200 "ok\n";
      }

      location /grafana {
        proxy_pass http://grafana.observability.svc.cluster.local:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /grafana;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-proxy
  namespace: apps
  labels:
    app: grafana-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-proxy
  template:
    metadata:
      labels:
        app: grafana-proxy
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: grafana-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-proxy-service
  namespace: apps
spec:
  type: ClusterIP
  selector:
    app: grafana-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: apps-ingress
  namespace: apps
  annotations:
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:618889059366:certificate/50e2d4a1-2003-4df5-82ab-374c284bbe84
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/tags: Project=week5-ci-cd,Environment=prod,ManagedBy=terraform
    alb.ingress.kubernetes.io/target-type: ip
    kubernetes.io/ingress.class: alb
spec:
  ingressClassName: alb
  rules:
    - host: mateus-tibaes.ezopscloud.co
      http:
        paths:
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: grafana-proxy-service
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
